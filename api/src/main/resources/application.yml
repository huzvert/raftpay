server:
  port: ${SERVER_PORT:8080}

raftpay:
  node:
    id: ${NODE_ID:node1}
  grpc:
    port: ${GRPC_PORT:9090}
  peers: ${PEERS:}
  data:
    dir: ${DATA_DIR:./data}
  election:
    timeout:
      min: ${ELECTION_TIMEOUT_MIN:300}
      max: ${ELECTION_TIMEOUT_MAX:500}
  heartbeat:
    interval: ${HEARTBEAT_INTERVAL:100}

spring:
  application:
    name: raftpay
