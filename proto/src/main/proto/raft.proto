syntax = "proto3";

package raftpay;

option java_package = "com.raftpay.proto";
option java_multiple_files = true;

// Core Raft consensus RPCs
service RaftService {
    // Pre-vote phase (Raft §9.6): asks peers "would you vote for me at term+1?"
    // without mutating any state. Prevents term inflation from spurious elections.
    rpc PreVote (VoteRequest) returns (VoteResponse);

    // Leader election: candidate requests votes from peers
    rpc RequestVote (VoteRequest) returns (VoteResponse);

    // Log replication: leader sends log entries (or heartbeats) to followers
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
}

// Inter-node forwarding service
service ClientService {
    // Forward a client command to the leader
    rpc ForwardCommand (ForwardCommandRequest) returns (ForwardCommandResponse);
}

// ============ Leader Election ============

message VoteRequest {
    int64 term = 1;            // candidate's term
    string candidate_id = 2;   // candidate requesting vote
    int64 last_log_index = 3;  // index of candidate's last log entry
    int64 last_log_term = 4;   // term of candidate's last log entry
}

message VoteResponse {
    int64 term = 1;            // currentTerm, for candidate to update itself
    bool vote_granted = 2;     // true = candidate received vote
}

// ============ Log Replication ============

message AppendEntriesRequest {
    int64 term = 1;                    // leader's term
    string leader_id = 2;             // so followers can redirect clients
    int64 prev_log_index = 3;         // index of log entry preceding new ones
    int64 prev_log_term = 4;          // term of prevLogIndex entry
    repeated LogEntryProto entries = 5; // log entries to store (empty for heartbeat)
    int64 leader_commit = 6;          // leader's commitIndex
}

message AppendEntriesResponse {
    int64 term = 1;            // currentTerm, for leader to update itself
    bool success = 2;          // true if follower contained matching entry
}

message LogEntryProto {
    int64 term = 1;            // term when entry was received by leader
    int64 index = 2;           // position in the log
    bytes command = 3;         // serialized command (opaque to Raft)
}

// ============ Client Forwarding ============

message ForwardCommandRequest {
    bytes command = 1;         // serialized command
    string idempotency_key = 2;
}

message ForwardCommandResponse {
    bool success = 1;
    string message = 2;
    bytes result = 3;          // serialized result from state machine
}
