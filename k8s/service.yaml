---
# Headless service for StatefulSet DNS (peer discovery)
apiVersion: v1
kind: Service
metadata:
  name: raftpay-headless
  labels:
    app: raftpay
spec:
  clusterIP: None
  selector:
    app: raftpay
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090

---
# External service for client access
apiVersion: v1
kind: Service
metadata:
  name: raftpay
  labels:
    app: raftpay
spec:
  type: NodePort
  selector:
    app: raftpay
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
